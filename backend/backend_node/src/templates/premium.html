<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<style>

  @font-face{
    font-family: 'Dancing Script';
    src: url(data:font/ttf;base64,{{dancingScript}}) format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  @font-face{
    font-family: 'Playfair';
    src: url(data:font/ttf;base64,{{playfair}}) format('truetype');
    font-weight: normal;
    font-style: normal;
  }

body {
  margin: 0;
  padding: 0;
  background: #f3f3f3;
  font-family: Arial, sans-serif;
}

  .container {
    width: 1123px;
    height: 794px;
    position: relative;
    overflow: hidden;
  }

  /*  SVG containers */
  .bg-top,
  .bg-bottom {
    position: absolute;
    width: 110%;
    height: 110%;
    z-index: 0;
  }

  .bg-top {
    top: -20px;
    left: -20px;
  }

  .bg-bottom {
    bottom: -20px;
    right: -20px;
  }

  .bg-top svg,
  .bg-bottom svg {
    width: 100%;
    height: 100%;
  }

  /* CONTEÚDO */
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content:center;
    align-items: center;
    text-align: center;
    padding: 40px;
    gap: 50px;
    z-index: 2;
  }

  .logo {
    width: 120px;
  }

  .title {
    font-family: 'Playfair';
    font-size: 48px;
    font-weight: bold;
    letter-spacing: 0.2em;
  }

  .text {
    font-size: 18px;
    color: #333;
  }

  .name {
    font-size: 56px;
    color: #ecbc22;
    font-family: 'Dancing Script', cursive;
    white-space: nowrap;
    margin: 10px 0;
  }

  .project {
    font-size: 24px;
    font-weight: bold;
    text-transform: uppercase;
    margin-top: 5px;
  }

  .footer {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .line {
    width: 300px;
    border-top: 1px solid black;
    margin-bottom: 5px;
  }

  .footer-text {
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .signature-name {
    font-size: 28px;
    color: #ecbc22;
    font-family: 'Dancing Script', cursive;
    margin-bottom: 8px;
    font-weight: 700;
  }

</style>
</head>

<body>

<div class="container">

  <!-- 🔥 SVG INLINE (ESSENCIAL) -->
  <div class="bg-top">
    {{topImage}}
  </div>

  <div class="bg-bottom">
    {{bottomImage}}
  </div>

  <div class="content">

    <!-- LOGO -->
    <img src="{{logo}}" class="logo" />

    <!-- TEXTO -->
    <div>
      <div class="title">CERTIFICADO</div>

      <p class="text">Certificamos que</p>

      <div class="name">{{name}}</div>

      <p class="text">participou do projeto</p>

      <div class="project">{{project}}</div>

      <p class="text">
        com carga horária de <strong>{{hours}} horas</strong>
      </p>
    </div>

    <!-- ASSINATURA -->
    <div class="footer">
      <div class="signature-name">Luyra Benini</div>
      <div class="line"></div>
      <div class="footer-text">Instrutora Responsável</div>
    </div>

  </div>

</div>

</body>
</html>
