<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<style>

  /* FONTS */
  @font-face{
    font-family: 'Dancing Script';
    src: url(data:font/ttf;base64,{{dancingScript}}) format('truetype');
  }

  @font-face{
    font-family: 'Playfair';
    src: url(data:font/ttf;base64,{{playfair}}) format('truetype');
    font-weight: bold;
  }

  body {
    margin: 0;
    padding: 0;
    background: #000;
    font-family: Arial, sans-serif;
  }

  .container {
    width: 1123px;
    height: 794px;
    position: relative;
    overflow: hidden;
    background: #000;
  }

  /* ONDAS */
  .bg-top,
  .bg-bottom {
    position: absolute;
    width: 110%;
    height: 110%;
    z-index: 0;
    opacity: 0.8; 
  }

  .bg-top {
    top: -20px;
    left: -20px;
  }

  .bg-bottom {
    bottom: -20px;
    right: -20px;
  }

  .bg-top svg,
  .bg-bottom svg {
    width: 100%;
    height: 100%;
  }

  /* CONTEÚDO */
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    text-align: center;
    padding: 40px 40px;
    z-index: 2;
  }

  .logo {
    width: 130px;
    filter: brightness(1.1); 
  }

  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  /* TÍTULO */
  .title {
    font-size: 46px;
    letter-spacing: 0.2em;
    color: #ffffff;
    font-family: 'Playfair', serif;
  }

  .text {
    font-size: 15px;
    color: #cfcfcf; /* equivalente ao text-gray-300 */
  }

  /* NOME */
  .name {
    font-size: 58px;
    color: #e30613;
    font-family: 'Dancing Script', cursive;
    white-space: nowrap;
  }

  /* PROJETO */
  .project {
    font-size: 22px;
    font-weight: 600;
    color: #ef4444; /* red-500 */
    text-transform: uppercase;
  }

  /* HORAS (destaque branco) */
  .hours strong {
    color: #ffffff;
  }

  /* RODAPÉ */
  .footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 10px;
  }

  .line {
    width: 320px;
    border-top: 1px solid white;
    margin-bottom: 6px;
  }

  .footer-text {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #ffffff;
  }

  .signature-name {
    font-size: 28px;
    color: #e30613;
    font-family: 'Dancing Script', cursive;
    margin-bottom: 6px;
    font-weight: 700;
  }

</style>
</head>

<body>

<div class="container">

  <!-- ONDAS -->
  <div class="bg-top">
    {{topImage}}
  </div>

  <div class="bg-bottom">
    {{bottomImage}}
  </div>

  <div class="content">

    <!-- LOGO -->
    <img src="{{logo}}" class="logo" />

    <!-- TEXTO CENTRAL -->
    <div class="center">

      <div class="title">CERTIFICADO</div>

      <p class="text">Certificamos que</p>

      <div class="name">{{name}}</div>

      <p class="text">participou do projeto</p>

      <div class="project">{{project}}</div>

      <p class="text hours">
        com carga horária de <strong>{{hours}} horas</strong>
      </p>

    </div>

    <!-- ASSINATURA -->
    <div class="footer">
      <div class="signature-name">Luyra Benini</div>
      <div class="line"></div>
      <div class="footer-text">Instrutora Responsável</div>
    </div>

  </div>

</div>

</body>
</html>
