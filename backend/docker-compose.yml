services:
  mysql_db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: controle-certificados-senai-db
      MYSQL_USER: root_db
      MYSQL_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
  
  backend_node:
    build: ./backend_node
    container_name: node_app
    ports:
      - "5000:5000"
    volumes:
      - ./backend_node:/app
      - /app/node_modules
    depends_on:
      mysql_db:
        condition: service_healthy
    networks:
      - app_network
  
  frontend_react:
    build: ./frontend
    container_name: react_app
    restart: always
    volumes:
      - /app/node_modules
    depends_on:
      - backend_node
    networks:
      - app_network

volumes:
  mysql_data:

networks:
  app_network:
    driver: bridge